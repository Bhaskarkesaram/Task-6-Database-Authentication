<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">


<h2>User Login</h2>


<form id="loginForm">


<input
type="email"
id="loginEmail"
placeholder="Email"
required>


<input
type="password"
id="loginPassword"
placeholder="Password"
required>


<button type="submit">
Login
</button>


<p>
No account?
<a href="register.html">Register</a>
</p>


</form>


<div id="message"></div>


</div>



<script src="js/auth.js"></script>


</body>

</html>
